<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>жҲ‘зҡ„е–®еӯ—жң¬</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=DM+Mono:wght@400;500&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --cream:#FAF7F2;--paper:#F3EDE3;--ink:#1C1917;--ink-light:#57534E;
  --ink-faint:#A8A29E;--accent:#C2410C;--accent-light:#FEF3EE;
  --accent-mid:#FDBA74;--green:#15803D;--green-light:#F0FDF4;
  --blue:#1D4ED8;--blue-light:#EFF6FF;--blue-mid:#BFDBFE;
  --purple:#7C3AED;--purple-light:#F5F3FF;--purple-mid:#DDD6FE;
  --border:#E7DFD3;--shadow:rgba(28,25,23,0.08);
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--cream);color:var(--ink);font-family:'Noto Sans TC',sans-serif;min-height:100vh}
header{background:var(--ink);color:var(--cream);padding:1.25rem 2rem;display:flex;align-items:baseline;gap:1rem;position:sticky;top:0;z-index:100}
header h1{font-family:'Lora',serif;font-size:1.4rem;font-weight:600}
header span{font-family:'DM Mono',monospace;font-size:0.75rem;color:#A8A29E}
#word-count-header{margin-left:auto;font-family:'DM Mono',monospace;font-size:0.75rem;color:#FDBA74}
.layout{max-width:860px;margin:0 auto;padding:2rem 1.5rem}
.tabs{display:flex;gap:0;border-bottom:1.5px solid var(--border);margin-bottom:2rem;flex-wrap:wrap}
.tab{font-family:'DM Mono',monospace;font-size:0.78rem;font-weight:500;letter-spacing:0.05em;padding:0.6rem 1.1rem;border:none;background:transparent;color:var(--ink-faint);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1.5px;transition:color 0.15s,border-color 0.15s;text-transform:uppercase}
.tab:hover{color:var(--ink)}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.panel{display:none}.panel.active{display:block}
input[type="text"],textarea{font-family:'Noto Sans TC',sans-serif;font-size:0.95rem;border:1px solid var(--border);border-radius:6px;padding:0.6rem 0.9rem;background:white;color:var(--ink);outline:none;transition:border-color 0.15s;width:100%}
input[type="text"]:focus,textarea:focus{border-color:var(--accent)}
textarea{resize:vertical;min-height:72px}
button{font-family:'DM Mono',monospace;font-size:0.8rem;font-weight:500;letter-spacing:0.04em;padding:0.6rem 1.2rem;border-radius:6px;border:1.5px solid var(--ink);background:var(--ink);color:var(--cream);cursor:pointer;transition:background 0.15s,color 0.15s;white-space:nowrap}
button:hover{background:var(--accent);border-color:var(--accent)}
button:disabled{opacity:0.5;cursor:not-allowed}
.speak-btn{background:transparent;border-color:var(--border);color:var(--ink-light);padding:0.4rem 0.9rem;font-size:0.75rem}
.speak-btn:hover{background:var(--ink);color:var(--cream);border-color:var(--ink)}
.add-btn{font-size:0.75rem;padding:4px 10px;flex-shrink:0}
.search-wrap{display:flex;gap:10px;margin-bottom:1.75rem}
.word-card{background:white;border:1px solid var(--border);border-radius:10px;padding:1.5rem;margin-bottom:1rem;box-shadow:0 2px 8px var(--shadow);animation:fadeIn 0.2s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.word-top{display:flex;align-items:flex-start;gap:10px;margin-bottom:1rem;flex-wrap:wrap}
.word-main{font-family:'Lora',serif;font-size:1.8rem;font-weight:600;color:var(--ink);line-height:1}
.badge{display:inline-block;font-family:'DM Mono',monospace;font-size:0.7rem;padding:3px 9px;border-radius:4px;font-weight:500;letter-spacing:0.04em}
.badge-pos{background:var(--paper);color:var(--ink-light);border:1px solid var(--border)}
.badge-repeat{background:var(--accent-light);color:var(--accent);border:1px solid var(--accent-mid)}
.word-actions{margin-left:auto;display:flex;gap:8px;align-items:center}
.field-label{font-family:'DM Mono',monospace;font-size:0.7rem;letter-spacing:0.08em;text-transform:uppercase;color:var(--ink-faint);margin-bottom:5px}
.field-def{font-size:1rem;color:var(--ink);margin-bottom:1rem;line-height:1.6}
.example-box{background:var(--paper);border-left:3px solid var(--accent);padding:0.75rem 1rem;border-radius:0 6px 6px 0;font-family:'Lora',serif;font-style:italic;font-size:0.95rem;color:var(--ink-light);line-height:1.7}
.form-card{background:white;border:1px solid var(--border);border-radius:10px;padding:1.5rem;box-shadow:0 2px 8px var(--shadow)}
.form-row{margin-bottom:1rem}
.form-row label{display:block;font-family:'DM Mono',monospace;font-size:0.72rem;letter-spacing:0.07em;text-transform:uppercase;color:var(--ink-faint);margin-bottom:6px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
.msg{margin-top:1rem;padding:0.7rem 1rem;border-radius:6px;font-size:0.88rem;display:none;line-height:1.5;white-space:pre-line}
.msg-warn{background:var(--accent-light);color:var(--accent);border:1px solid var(--accent-mid)}
.msg-ok{background:var(--green-light);color:var(--green);border:1px solid #BBF7D0}
.review-item{display:flex;align-items:center;justify-content:space-between;padding:0.9rem 1.1rem;background:white;border:1px solid var(--border);border-radius:8px;margin-bottom:8px;gap:12px}
.review-word{font-family:'Lora',serif;font-size:1.05rem;font-weight:600}
.review-def{font-size:0.82rem;color:var(--ink-light);margin-top:2px}
.review-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
.quiz-card{background:white;border:1px solid var(--border);border-radius:10px;padding:2rem;text-align:center;box-shadow:0 2px 8px var(--shadow);min-height:260px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1rem}
.quiz-word{font-family:'Lora',serif;font-size:2.5rem;font-weight:600;color:var(--ink)}
.quiz-answer{background:var(--paper);border-radius:8px;padding:1rem 1.5rem;width:100%;text-align:left;display:none;animation:fadeIn 0.2s ease}
.quiz-controls{display:flex;gap:10px;flex-wrap:wrap;justify-content:center}
.stats-bar{display:flex;gap:1.5rem;margin-top:2rem;flex-wrap:wrap}
.stat{display:flex;flex-direction:column;gap:2px}
.stat-num{font-family:'DM Mono',monospace;font-size:1.4rem;font-weight:500;color:var(--ink)}
.stat-label{font-family:'DM Mono',monospace;font-size:0.68rem;letter-spacing:0.07em;text-transform:uppercase;color:var(--ink-faint)}
.divider-v{width:1px;background:var(--border);align-self:stretch}
.empty{text-align:center;padding:3rem 1rem;color:var(--ink-faint);font-size:0.9rem;line-height:2}
.batch-section-title{font-family:'DM Mono',monospace;font-size:0.72rem;letter-spacing:0.07em;text-transform:uppercase;color:var(--ink-faint);margin:1.25rem 0 0.6rem;padding-bottom:6px;border-bottom:1px solid var(--border)}
.batch-row{background:white;border:1px solid var(--border);border-radius:8px;margin-bottom:6px;overflow:hidden}
.batch-row-main{display:flex;align-items:center;gap:10px;padding:0.75rem 1rem}
.batch-row-example{font-size:0.8rem;font-style:italic;color:var(--ink-faint);padding:0 1rem 0.6rem 1.25rem;font-family:'Lora',serif}
.bw{font-family:'Lora',serif;font-size:1rem;font-weight:600;min-width:150px}
.bd{font-size:0.85rem;color:var(--ink-light);flex:1}
.tag{font-family:'DM Mono',monospace;font-size:0.68rem;padding:2px 7px;border-radius:3px;font-weight:500;white-space:nowrap}
.row-exact{border-left:3px solid var(--green)}
.row-typo{border-left:3px solid var(--blue)}
.row-related{border-left:3px solid var(--purple)}
.row-new{border-left:3px solid var(--accent-mid)}
.row-corrected-new{border-left:3px solid #94A3B8}
.tag-exact{background:var(--green-light);color:var(--green)}
.tag-typo{background:var(--blue-light);color:var(--blue)}
.tag-related{background:var(--purple-light);color:var(--purple)}
.tag-new{background:var(--accent-light);color:var(--accent)}
.tag-corrected-new{background:#F1F5F9;color:#64748B}
.checking-status{font-family:'DM Mono',monospace;font-size:0.78rem;color:var(--ink-faint);padding:1rem 0;text-align:center}
.progress-bar{width:100%;height:4px;background:var(--border);border-radius:2px;margin-top:8px;overflow:hidden}
.progress-fill{height:100%;background:var(--accent);border-radius:2px;transition:width 0.3s}
@media(max-width:600px){.form-grid{grid-template-columns:1fr}.layout{padding:1.25rem 1rem}.quiz-word{font-size:1.8rem}}
</style>
</head>
<body>

<header>
  <h1>жҲ‘зҡ„е–®еӯ—жң¬</h1>
  <span>My Vocabulary</span>
  <span id="word-count-header">ијүе…Ҙдёӯ...</span>
</header>

<div class="layout">
  <div class="tabs">
    <button class="tab active" id="tab-search" onclick="switchTab('search')">жҹҘе–®еӯ— Search</button>
    <button class="tab" id="tab-batch" onclick="switchTab('batch')">жү№ж¬ЎжӘўжҹҘ Batch</button>
    <button class="tab" id="tab-add" onclick="switchTab('add')">ж–°еўһ Add</button>
    <button class="tab" id="tab-review" onclick="switchTab('review')">еҠ еј·жё…е–® Review</button>
    <button class="tab" id="tab-quiz" onclick="switchTab('quiz')">жё¬й©— Quiz</button>
  </div>

  <div id="panel-search" class="panel active">
    <div class="search-wrap">
      <input type="text" id="search-input" placeholder="ијёе…Ҙе–®еӯ— / Enter a word..." onkeydown="if(event.key==='Enter')doSearch()">
      <button onclick="doSearch()">жҗңе°Ӣ</button>
    </div>
    <div id="search-result"></div>
    <div class="stats-bar">
      <div class="stat"><span class="stat-num" id="stat-total">вҖ”</span><span class="stat-label">Total Words</span></div>
      <div class="divider-v"></div>
      <div class="stat"><span class="stat-num" id="stat-repeat">вҖ”</span><span class="stat-label">йңҖеҠ еј·</span></div>
      <div class="divider-v"></div>
      <div class="stat"><span class="stat-num" id="stat-new">вҖ”</span><span class="stat-label">еҸӘиЁҳдёҖж¬Ў</span></div>
    </div>
  </div>

  <div id="panel-batch" class="panel">
    <div class="form-card" style="margin-bottom:1rem">
      <div class="form-row">
        <label>иІјдёҠе–®еӯ—жё…е–®пјҲйҖ—иҷҹгҖҒеҸҘиҷҹгҖҒжҸӣиЎҢйғҪеҸҜд»ҘпјҢжү“йҢҜеӯ—жІ’й—ңдҝӮпјү</label>
        <textarea id="batch-input" style="min-height:120px" placeholder="frontal. plane. virtually. groive. inclintion&#10;жҲ–зӣҙжҺҘиІјдёҖж•ҙж®өж–Үеӯ—йғҪеҸҜд»Ҙ"></textarea>
      </div>
      <button id="batch-btn" onclick="doBatchCheck()">жү№ж¬ЎжӘўжҹҘ Check All</button>
    </div>
    <div id="batch-status"></div>
    <div id="batch-result"></div>
  </div>

  <div id="panel-add" class="panel">
    <div class="form-card">
      <div class="form-grid">
        <div class="form-row"><label>е–®еӯ— Word</label><input type="text" id="new-word" placeholder="e.g. eloquent"></div>
        <div class="form-row"><label>и©һжҖ§ Part of Speech</label><input type="text" id="new-pos" placeholder="adj / n / v / adv"></div>
      </div>
      <div class="form-row"><label>и§ЈйҮӢ Definition</label><input type="text" id="new-def" placeholder="дёӯж–Үи§ЈйҮӢ"></div>
      <div class="form-row"><label>дҪ зҡ„дҫӢеҸҘ Your Example</label><textarea id="new-example" placeholder="з”ЁиҮӘе·ұзҡ„еҸҘеӯҗпјҢжүҚжңүж„ҹиЁҳжҶ¶..."></textarea></div>
      <button onclick="addWord()" style="width:100%">еҠ е…ҘзӯҶиЁҳ Add to Notebook</button>
      <div id="add-msg" class="msg"></div>
    </div>
    <div style="margin-top:1rem;padding:1rem;border:1px dashed var(--border);border-radius:8px;font-size:0.82rem;color:var(--ink-faint);line-height:1.8">
      ж–°еўһеҫҢи«ӢеҗҢжӯҘеҲ° Google SheetsпјҢйҮҚж–°ж•ҙзҗҶй ҒйқўеҫҢиіҮж–ҷе°ұжңғжӣҙж–°гҖӮ
    </div>
  </div>

  <div id="panel-review" class="panel">
    <div id="review-list"><div class="empty">ијүе…Ҙдёӯ...</div></div>
  </div>

  <div id="panel-quiz" class="panel">
    <div class="quiz-card" id="quiz-card">
      <div style="font-size:0.85rem;color:var(--ink-faint);font-family:'DM Mono',monospace">жҢүдёӢй–Ӣе§ӢпјҢйҡЁж©ҹжҠҪдёҖеҖӢе–®еӯ—жё¬й©—дҪ </div>
      <button onclick="startQuiz()">й–Ӣе§Ӣжё¬й©— Start Quiz</button>
    </div>
  </div>
</div>

<script>
var API_URL = 'https://script.google.com/macros/s/AKfycby4tpeaI7nGnYYf74hxU9j9esMIRbBt2Lguz5gKw3b5YKd2InLS3ikeywNlfZtytuM/exec';
var DICT_API = 'https://api.dictionaryapi.dev/api/v2/entries/en/';
var vocab = [];

function switchTab(name) {
  var names = ['search','batch','add','review','quiz'];
  for (var i=0;i<names.length;i++) {
    var n=names[i];
    document.getElementById('tab-'+n).classList.toggle('active',n===name);
    document.getElementById('panel-'+n).classList.toggle('active',n===name);
  }
  if (name==='review') renderReview();
  if (name==='quiz') resetQuiz();
}

function speak(word) {
  var u=new SpeechSynthesisUtterance(word);
  u.lang='en-US'; u.rate=0.9;
  window.speechSynthesis.cancel();
  window.speechSynthesis.speak(u);
}

function doSearch() {
  var q=document.getElementById('search-input').value.trim().toLowerCase();
  var el=document.getElementById('search-result');
  if (!q){el.innerHTML='';return;}
  var results=vocab.filter(function(v){return v.word.toLowerCase().includes(q);});
  if (!results.length){
    el.innerHTML='<div class="empty">жүҫдёҚеҲ°гҖҢ'+q+'гҖҚ<br>еҸҜд»ҘеҲ°гҖҢж–°еўһгҖҚжҠҠе®ғеҠ йҖІзӯҶиЁҳ</div>';
    return;
  }
  el.innerHTML=results.map(wordCardHTML).join('');
}

function wordCardHTML(v) {
  var sw=v.word.replace(/'/g,"\\'");
  var repeatBadge=v.repeat>1?'<span class="badge badge-repeat">йҮҚиӨҮ '+v.repeat+' ж¬Ў</span>':'';
  var phonetic=v.phonetic?'<span style="font-size:0.9rem;color:var(--ink-faint);font-family:\'DM Mono\',monospace">'+v.phonetic+'</span>':'';
  var derivative=v.derivative?'<div class="field-label" style="margin-top:10px">иЎҚз”ҹеӯ—</div><div style="font-size:0.88rem;color:var(--ink-light);margin-top:4px">'+v.derivative+'</div>':'';
  return '<div class="word-card">'+
    '<div class="word-top">'+
      '<span class="word-main">'+v.word+'</span>'+phonetic+
      (v.pos?'<span class="badge badge-pos">'+v.pos+'</span>':'')+repeatBadge+
      '<div class="word-actions"><button class="speak-btn" onclick="speak(\''+sw+'\')">в–¶ зҷјйҹі</button></div>'+
    '</div>'+
    '<div class="field-label">дёӯж–Үи§ЈйҮӢ</div><div class="field-def">'+v.definition+'</div>'+
    (v.example?'<div class="field-label">дҫӢеҸҘ</div><div class="example-box">'+v.example+'</div>':'')+
    derivative+'</div>';
}

function addWord() {
  var word=document.getElementById('new-word').value.trim();
  var pos=document.getElementById('new-pos').value.trim();
  var def=document.getElementById('new-def').value.trim();
  var ex=document.getElementById('new-example').value.trim();
  var msg=document.getElementById('add-msg');
  if (!word){showMsg(msg,'и«Ӣијёе…Ҙе–®еӯ—','warn');return;}
  if (!def){showMsg(msg,'и«Ӣијёе…Ҙи§ЈйҮӢ','warn');return;}
  var existing=vocab.find(function(v){return v.word.toLowerCase()===word.toLowerCase();});
  if (existing){
    existing.repeat++;
    showMsg(msg,'вҡ  гҖҢ'+word+'гҖҚдҪ д№ӢеүҚе·Із¶“иЁҳйҒҺдәҶпјҒ\nи«ӢеҲ° Google Sheets е°Ү Repeat ж¬„дҪҚжӣҙж–°зӮә '+existing.repeat,'warn');
    return;
  }
  vocab.push({word:word,pos:pos,definition:def,example:ex,phonetic:'',derivative:'',repeat:1});
  showMsg(msg,'вң“ гҖҢ'+word+'гҖҚе·Іжҡ«еӯҳпјҒ\nи«ӢеҲ° Google Sheets ж–°еўһйҖҷзӯҶиіҮж–ҷеҫҢйҮҚж–°ж•ҙзҗҶгҖӮ','ok');
  updateStats();
  ['new-word','new-pos','new-def','new-example'].forEach(function(id){document.getElementById(id).value='';});
}

function showMsg(el,text,type){
  el.textContent=text;
  el.className='msg '+(type==='warn'?'msg-warn':'msg-ok');
  el.style.display='block';
}

function updateStats(){
  document.getElementById('stat-total').textContent=vocab.length;
  document.getElementById('stat-repeat').textContent=vocab.filter(function(v){return v.repeat>1;}).length;
  document.getElementById('stat-new').textContent=vocab.filter(function(v){return v.repeat===1;}).length;
}

function renderReview(){
  var list=vocab.filter(function(v){return v.repeat>1;}).sort(function(a,b){return b.repeat-a.repeat;});
  var el=document.getElementById('review-list');
  if (!list.length){el.innerHTML='<div class="empty">зӣ®еүҚжІ’жңүйҮҚиӨҮиЁҳйҢ„зҡ„е–®еӯ—пјҢз№јзәҢеҠ жІ№пјҒ</div>';return;}
  var html='<div class="batch-section-title">'+list.length+' words need review</div>';
  list.forEach(function(v){
    var sw=v.word.replace(/'/g,"\\'");
    html+='<div class="review-item">'+
      '<div><div class="review-word">'+v.word+'</div><div class="review-def">'+v.definition+'</div></div>'+
      '<div class="review-right"><span class="badge badge-repeat">Г—'+v.repeat+'</span>'+
      '<button class="speak-btn" onclick="speak(\''+sw+'\')">в–¶</button></div></div>';
  });
  el.innerHTML=html;
}

function resetQuiz(){
  document.getElementById('quiz-card').innerHTML=
    '<div style="font-size:0.85rem;color:var(--ink-faint);font-family:\'DM Mono\',monospace">жҢүдёӢй–Ӣе§ӢпјҢйҡЁж©ҹжҠҪдёҖеҖӢе–®еӯ—жё¬й©—дҪ </div>'+
    '<button onclick="startQuiz()">й–Ӣе§Ӣжё¬й©— Start Quiz</button>';
}

function startQuiz(){
  if (!vocab.length) return;
  var weighted=[];
  vocab.forEach(function(v){for(var i=0;i<v.repeat;i++)weighted.push(v);});
  var qw=weighted[Math.floor(Math.random()*weighted.length)];
  var sw=qw.word.replace(/'/g,"\\'");
  document.getElementById('quiz-card').innerHTML=
    '<div style="font-size:0.85rem;color:var(--ink-faint);font-family:\'DM Mono\',monospace">йҖҷеҖӢе–®еӯ—жҳҜд»Җйәјж„ҸжҖқпјҹ</div>'+
    '<div class="quiz-word">'+qw.word+'</div>'+
    '<button class="speak-btn" onclick="speak(\''+sw+'\')">в–¶ зҷјйҹі</button>'+
    '<div class="quiz-answer" id="quiz-answer">'+
      '<div class="field-label" style="margin-bottom:6px">дёӯж–Үи§ЈйҮӢ</div>'+
      '<div style="font-size:1rem;margin-bottom:10px">'+qw.definition+'</div>'+
      (qw.example?'<div class="field-label" style="margin-bottom:6px">дҫӢеҸҘ</div>'+
        '<div style="font-family:\'Lora\',serif;font-style:italic;font-size:0.92rem;color:var(--ink-light)">'+qw.example+'</div>':'')+
    '</div>'+
    '<div class="quiz-controls">'+
      '<button style="background:transparent;border-color:var(--border);color:var(--ink)" onclick="document.getElementById(\'quiz-answer\').style.display=\'block\'">йЎҜзӨәзӯ”жЎҲ</button>'+
      '<button onclick="startQuiz()">дёӢдёҖйЎҢ Next вҶ’</button>'+
    '</div>';
}

// в”Җв”Җ е·Ҙе…·еҮҪејҸ в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ

function levenshtein(a,b){
  var m=a.length,n=b.length,dp=[],i,j;
  for(i=0;i<=m;i++){dp[i]=[];for(j=0;j<=n;j++)dp[i][j]=i===0?j:j===0?i:0;}
  for(i=1;i<=m;i++)for(j=1;j<=n;j++)
    dp[i][j]=a[i-1]===b[j-1]?dp[i-1][j-1]:1+Math.min(dp[i-1][j],dp[i][j-1],dp[i-1][j-1]);
  return dp[m][n];
}

function getStem(w){
  w=w.toLowerCase();
  var suffixes=['ability','ibility','ation','ition','ness','ment','ity','ful','less','ing','tion','sion','ed','er','ly','al','ic','ive','ous','en','es','s','y','e'];
  for(var i=0;i<suffixes.length;i++){
    if(w.length>suffixes[i].length+3&&w.endsWith(suffixes[i]))
      return w.slice(0,w.length-suffixes[i].length);
  }
  return w;
}

// жҹҘеӯ—е…ё APIпјҡзўәиӘҚжҳҜеҗҰзӮәзңҹеҜҰе–®еӯ—
async function isRealWord(word){
  try{
    var res=await fetch(DICT_API+encodeURIComponent(word.toLowerCase()));
    return res.ok;
  }catch(e){return false;}
}

// жүҫзӯҶиЁҳиЈЎжңҖжҺҘиҝ‘зҡ„еӯ—пјҲLevenshteinпјү
function findClosestInVocab(input){
  var inpL=input.toLowerCase();
  var maxDist=inpL.length>=8?2:1;
  var best=null,bestDist=999;
  for(var i=0;i<vocab.length;i++){
    var d=levenshtein(inpL,vocab[i].word.toLowerCase());
    if(d<bestDist){bestDist=d;best=vocab[i];}
  }
  return (best&&bestDist>0&&bestDist<=maxDist)?{vocab:best,dist:bestDist}:null;
}

// жүҫеӯ—ж №зӣёй—ңзҡ„зӯҶиЁҳе–®еӯ—
function findRelatedInVocab(input){
  var inpStem=getStem(input.toLowerCase());
  if(inpStem.length<4)return null;
  for(var i=0;i<vocab.length;i++){
    var vStem=getStem(vocab[i].word.toLowerCase());
    if(vStem.length>=4&&(inpStem===vStem||inpStem.startsWith(vStem)||vStem.startsWith(inpStem)))
      return vocab[i];
  }
  return null;
}

// жүҫзӯҶиЁҳиЈЎе®Ңе…Ёз¬ҰеҗҲ
function findExactInVocab(input){
  var inpL=input.toLowerCase();
  return vocab.find(function(v){return v.word.toLowerCase()===inpL;})||null;
}

// дё»иҰҒжү№ж¬ЎжӘўжҹҘпјҲйқһеҗҢжӯҘпјү
async function doBatchCheck(){
  var raw=document.getElementById('batch-input').value;
  var statusEl=document.getElementById('batch-status');
  var resultEl=document.getElementById('batch-result');
  var btn=document.getElementById('batch-btn');

  if(!raw.trim()){resultEl.innerHTML='';return;}
  if(!vocab.length){resultEl.innerHTML='<div class="empty">иіҮж–ҷе°ҡжңӘијүе…ҘпјҢи«ӢзЁҚеҫҢеҶҚи©Ұ</div>';return;}

  var inputs=raw.split(/[\n,\.;\/]+/).map(function(w){return w.trim();}).filter(function(w){return w.length>1;});

  // еҺ»йҮҚ
  var seen={};
  inputs=inputs.filter(function(w){
    var k=w.toLowerCase();
    if(seen[k])return false;
    seen[k]=true;return true;
  });

  btn.disabled=true;
  resultEl.innerHTML='';

  // йҖІеәҰйЎҜзӨә
  statusEl.innerHTML='<div class="checking-status">жӯЈеңЁжҹҘи©ў '+inputs.length+' еҖӢе–®еӯ—...<div class="progress-bar"><div class="progress-fill" id="prog" style="width:0%"></div></div></div>';

  var groups={exact:[],typo:[],related:[],'corrected-new':[],'new':[]};

  for(var idx=0;idx<inputs.length;idx++){
    var inp=inputs[idx];
    var inpL=inp.toLowerCase();

    // жӣҙж–°йҖІеәҰ
    var pct=Math.round((idx+1)/inputs.length*100);
    var progEl=document.getElementById('prog');
    if(progEl)progEl.style.width=pct+'%';
    var stEl=document.getElementById('batch-status');
    if(stEl)stEl.querySelector('.checking-status').childNodes[0].textContent='жӯЈеңЁжҹҘи©ўпјҲ'+( idx+1)+'/'+inputs.length+'пјүпјҡ'+inp+'  ';

    // Step 1: е®Ңе…Ёз¬ҰеҗҲзӯҶиЁҳ
    var exact=findExactInVocab(inp);
    if(exact){groups.exact.push({input:inp,vocab:exact});continue;}

    // Step 2: зўәиӘҚжҳҜеҗҰзӮәзңҹеҜҰиӢұж–Үе–®еӯ—
    var real=await isRealWord(inp);

    if(real){
      // зңҹеҜҰе–®еӯ—дҪҶзӯҶиЁҳжІ’жңү вҶ’ еӯ—ж №жҜ”е°Қ
      var related=findRelatedInVocab(inp);
      if(related){
        groups.related.push({input:inp,vocab:related});
      }else{
        groups['new'].push({input:inp});
      }
    }else{
      // дёҚжҳҜзңҹеҜҰе–®еӯ— вҶ’ жӢјйҢҜдәҶпјҢжүҫжңҖжҺҘиҝ‘зҡ„зӯҶиЁҳе–®еӯ—
      var closest=findClosestInVocab(inp);
      if(closest){
        // жӢјйҢҜ + зӯҶиЁҳжңү
        groups.typo.push({input:inp,vocab:closest.vocab,correctedWord:closest.vocab.word});
      }else{
        // жӢјйҢҜ + зӯҶиЁҳд№ҹжІ’жңү вҶ’ жүҫе…ЁйғЁе–®еӯ—иЈЎжңҖжҺҘиҝ‘зҡ„пјҲдёҚйҷҗзӯҶиЁҳпјү
        // з”Ё Levenshtein еңЁзӯҶиЁҳиЈЎжүҫпјҢеҸ–жңҖиҝ‘зҡ„дҪңзӮәзҢңжё¬
        var bestGuess=null,bestD=999;
        for(var i=0;i<vocab.length;i++){
          var d=levenshtein(inpL,vocab[i].word.toLowerCase());
          if(d<bestD){bestD=d;bestGuess=vocab[i];}
        }
        var threshold=Math.max(2,Math.floor(inpL.length*0.4));
        if(bestGuess&&bestD<=threshold){
          groups['corrected-new'].push({input:inp,correctedWord:bestGuess.word});
        }else{
          groups['new'].push({input:inp});
        }
      }
    }
  }

  statusEl.innerHTML='';
  btn.disabled=false;

  var html='';

  if(groups.exact.length){
    html+='<div class="batch-section-title">вң“ дҪ е·ІиЁҳйҢ„йҒҺпјҲ'+groups.exact.length+' еҖӢпјү</div>';
    groups.exact.forEach(function(r){
      html+=buildRow(r.vocab.word,null,'exact','tag-exact','е·ІиЁҳйҢ„',r.vocab.definition,r.vocab.example,r.vocab.word);
    });
  }

  if(groups.typo.length){
    html+='<div class="batch-section-title" style="margin-top:1.5rem">вңҺ жӢјеӯ—е·Іж ЎжӯЈпјҢдҪ жңүиЁҳйҢ„йҒҺпјҲ'+groups.typo.length+' еҖӢпјү</div>';
    groups.typo.forEach(function(r){
      html+=buildRow(r.vocab.word,'дҪ жү“пјҡ'+r.input+' вҶ’ '+r.correctedWord,'typo','tag-typo','е·Іж ЎжӯЈ',r.vocab.definition,r.vocab.example,r.vocab.word);
    });
  }

  if(groups.related.length){
    html+='<div class="batch-section-title" style="margin-top:1.5rem">гҖң еӯ—ж №зӣёй—ңпјҢдҪ жңүиЁҳйҢ„йҒҺпјҲ'+groups.related.length+' еҖӢпјү</div>';
    groups.related.forEach(function(r){
      html+=buildRow(r.vocab.word,r.input+' зҡ„зӣёй—ңеӯ—','related','tag-related','зӣёй—ңеӯ—',r.vocab.definition,r.vocab.example,r.input);
    });
  }

  if(groups['corrected-new'].length){
    html+='<div class="batch-section-title" style="margin-top:1.5rem">в—Һ е·Іж ЎжӯЈпјҢе°ҡжңӘеңЁзӯҶиЁҳдёӯпјҲ'+groups['corrected-new'].length+' еҖӢпјү</div>';
    groups['corrected-new'].forEach(function(r){
      html+=buildRow(r.correctedWord,'дҪ жү“пјҡ'+r.input+' вҶ’ '+r.correctedWord,'corrected-new','tag-corrected-new','ж ЎжӯЈеҫҢ',null,null,r.correctedWord);
    });
  }

  if(groups['new'].length){
    html+='<div class="batch-section-title" style="margin-top:1.5rem">вҳ… е°ҡжңӘиЁҳйҢ„пјҲ'+groups['new'].length+' еҖӢпјү</div>';
    groups['new'].forEach(function(r){
      html+=buildRow(r.input,null,'new','tag-new','жңӘиЁҳйҢ„',null,null,r.input);
    });
  }

  resultEl.innerHTML=html||'<div class="empty">жІ’жңүжүҫеҲ°д»»дҪ•е–®еӯ—</div>';
}

function buildRow(word,sublabel,rowClass,tagClass,tagText,def,example,addW){
  var sw=word.replace(/'/g,"\\'");
  var sa=(addW||word).replace(/'/g,"\\'");
  return '<div class="batch-row row-'+rowClass+'">'+
    '<div class="batch-row-main">'+
      '<div style="flex:1;min-width:0">'+
        '<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">'+
          '<span class="bw">'+word+'</span>'+
          '<span class="tag '+tagClass+'">'+tagText+'</span>'+
          (sublabel?'<span style="font-size:0.75rem;color:var(--ink-faint);font-family:\'DM Mono\',monospace">'+sublabel+'</span>':'')+
        '</div>'+
        (def?'<div class="bd" style="margin-top:3px">'+def+'</div>':'')+
      '</div>'+
      '<div style="display:flex;gap:6px;flex-shrink:0">'+
        '<button class="speak-btn" onclick="speak(\''+sw+'\')">в–¶</button>'+
        '<button class="add-btn" onclick="prefillAdd(\''+sa+'\')">+ ж–°еўһ</button>'+
      '</div>'+
    '</div>'+
    (example?'<div class="batch-row-example">'+example+'</div>':'')+
  '</div>';
}

function prefillAdd(word){
  switchTab('add');
  document.getElementById('new-word').value=word;
  document.getElementById('new-word').focus();
}

async function loadVocab(){
  try{
    var res=await fetch(API_URL);
    var rows=await res.json();
    vocab=rows.map(function(r){
      return{
        word:      String(r['е–®еӯ—']  ||'').trim(),
        phonetic:  String(r['йҹіжЁҷ']  ||'').trim(),
        pos:       String(r['и©һжҖ§']  ||'').trim(),
        definition:String(r['дёӯж–Ү']  ||'').trim(),
        example:   String(r['дҫӢеҸҘ']  ||'').trim(),
        derivative:String(r['иЎҚз”ҹеӯ—']||'').trim(),
        repeat:    parseInt(r['Repeat'])||1
      };
    }).filter(function(r){return r.word;});
    updateStats();
    document.getElementById('word-count-header').textContent=vocab.length+' words';
  }catch(e){
    document.getElementById('word-count-header').textContent='ијүе…ҘеӨұж•—пјҢи«ӢйҮҚж–°ж•ҙзҗҶ';
    console.error(e);
  }
}

loadVocab();
</script>
