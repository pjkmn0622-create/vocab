<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>我的單字本</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=DM+Mono:wght@400;500&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --cream: #FAF7F2;
    --paper: #F3EDE3;
    --ink: #1C1917;
    --ink-light: #57534E;
    --ink-faint: #A8A29E;
    --accent: #C2410C;
    --accent-light: #FEF3EE;
    --accent-mid: #FDBA74;
    --green: #15803D;
    --green-light: #F0FDF4;
    --border: #E7DFD3;
    --shadow: rgba(28,25,23,0.08);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--cream);
    color: var(--ink);
    font-family: 'Noto Sans TC', sans-serif;
    min-height: 100vh;
  }

  /* Header */
  header {
    background: var(--ink);
    color: var(--cream);
    padding: 1.25rem 2rem;
    display: flex;
    align-items: baseline;
    gap: 1rem;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  header h1 {
    font-family: 'Lora', serif;
    font-size: 1.4rem;
    font-weight: 600;
    letter-spacing: 0.01em;
  }

  header span {
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    color: var(--ink-faint);
  }

  #word-count-header {
    margin-left: auto;
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    color: var(--accent-mid);
  }

  /* Layout */
  .layout {
    max-width: 860px;
    margin: 0 auto;
    padding: 2rem 1.5rem;
  }

  /* Tabs */
  .tabs {
    display: flex;
    gap: 0;
    border-bottom: 1.5px solid var(--border);
    margin-bottom: 2rem;
  }

  .tab {
    font-family: 'DM Mono', monospace;
    font-size: 0.78rem;
    font-weight: 500;
    letter-spacing: 0.05em;
    padding: 0.6rem 1.25rem;
    border: none;
    background: transparent;
    color: var(--ink-faint);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    margin-bottom: -1.5px;
    transition: color 0.15s, border-color 0.15s;
    text-transform: uppercase;
  }

  .tab:hover { color: var(--ink); }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  .panel { display: none; }
  .panel.active { display: block; }

  /* Search */
  .search-wrap {
    display: flex;
    gap: 10px;
    margin-bottom: 1.75rem;
  }

  input[type="text"], textarea, select {
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 0.95rem;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 0.6rem 0.9rem;
    background: white;
    color: var(--ink);
    outline: none;
    transition: border-color 0.15s;
    width: 100%;
  }

  input[type="text"]:focus, textarea:focus { border-color: var(--accent); }

  textarea { resize: vertical; min-height: 72px; }

  button {
    font-family: 'DM Mono', monospace;
    font-size: 0.8rem;
    font-weight: 500;
    letter-spacing: 0.04em;
    padding: 0.6rem 1.2rem;
    border-radius: 6px;
    border: 1.5px solid var(--ink);
    background: var(--ink);
    color: var(--cream);
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
    white-space: nowrap;
  }

  button:hover { background: var(--accent); border-color: var(--accent); }

  button.outline {
    background: transparent;
    color: var(--ink);
  }
  button.outline:hover { background: var(--ink); color: var(--cream); }

  button.speak-btn {
    background: transparent;
    border-color: var(--border);
    color: var(--ink-light);
    padding: 0.4rem 0.9rem;
    font-size: 0.75rem;
  }
  button.speak-btn:hover { background: var(--ink); color: var(--cream); border-color: var(--ink); }

  /* Word Card */
  .word-card {
    background: white;
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1.5rem;
    margin-bottom: 1rem;
    box-shadow: 0 2px 8px var(--shadow);
    animation: fadeIn 0.2s ease;
  }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

  .word-top {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    margin-bottom: 1rem;
    flex-wrap: wrap;
  }

  .word-main {
    font-family: 'Lora', serif;
    font-size: 1.8rem;
    font-weight: 600;
    color: var(--ink);
    line-height: 1;
  }

  .badge {
    display: inline-block;
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    padding: 3px 9px;
    border-radius: 4px;
    font-weight: 500;
    letter-spacing: 0.04em;
  }

  .badge-pos { background: var(--paper); color: var(--ink-light); border: 1px solid var(--border); }
  .badge-repeat { background: var(--accent-light); color: var(--accent); border: 1px solid var(--accent-mid); }

  .word-actions { margin-left: auto; display: flex; gap: 8px; align-items: center; }

  .field-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--ink-faint);
    margin-bottom: 5px;
  }

  .field-def {
    font-size: 1rem;
    color: var(--ink);
    margin-bottom: 1rem;
    line-height: 1.6;
  }

  .example-box {
    background: var(--paper);
    border-left: 3px solid var(--accent);
    padding: 0.75rem 1rem;
    border-radius: 0 6px 6px 0;
    font-family: 'Lora', serif;
    font-style: italic;
    font-size: 0.95rem;
    color: var(--ink-light);
    line-height: 1.7;
  }

  /* Form Card */
  .form-card {
    background: white;
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1.5rem;
    box-shadow: 0 2px 8px var(--shadow);
  }

  .form-row {
    margin-bottom: 1rem;
  }

  .form-row label {
    display: block;
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    letter-spacing: 0.07em;
    text-transform: uppercase;
    color: var(--ink-faint);
    margin-bottom: 6px;
  }

  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }

  .msg {
    margin-top: 1rem;
    padding: 0.7rem 1rem;
    border-radius: 6px;
    font-size: 0.88rem;
    display: none;
    line-height: 1.5;
  }
  .msg-warn { background: var(--accent-light); color: var(--accent); border: 1px solid var(--accent-mid); }
  .msg-ok { background: var(--green-light); color: var(--green); border: 1px solid #BBF7D0; }

  /* Review List */
  .review-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0.9rem 1.1rem;
    background: white;
    border: 1px solid var(--border);
    border-radius: 8px;
    margin-bottom: 8px;
    gap: 12px;
    transition: box-shadow 0.15s;
  }
  .review-item:hover { box-shadow: 0 2px 8px var(--shadow); }
  .review-word { font-family: 'Lora', serif; font-size: 1.05rem; font-weight: 600; }
  .review-def { font-size: 0.82rem; color: var(--ink-light); margin-top: 2px; }
  .review-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }

  /* Quiz */
  .quiz-card {
    background: white;
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 2rem;
    text-align: center;
    box-shadow: 0 2px 8px var(--shadow);
    min-height: 260px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 1rem;
  }

  .quiz-word {
    font-family: 'Lora', serif;
    font-size: 2.5rem;
    font-weight: 600;
    color: var(--ink);
  }

  .quiz-hint {
    font-size: 0.85rem;
    color: var(--ink-faint);
    font-family: 'DM Mono', monospace;
  }

  .quiz-answer {
    background: var(--paper);
    border-radius: 8px;
    padding: 1rem 1.5rem;
    width: 100%;
    text-align: left;
    display: none;
    animation: fadeIn 0.2s ease;
  }

  .quiz-controls { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }

  /* Empty */
  .empty {
    text-align: center;
    padding: 3rem 1rem;
    color: var(--ink-faint);
    font-size: 0.9rem;
    line-height: 2;
  }

  /* Loading */
  .loading {
    text-align: center;
    padding: 3rem;
    font-family: 'DM Mono', monospace;
    font-size: 0.8rem;
    color: var(--ink-faint);
    letter-spacing: 0.05em;
  }

  .loading::after {
    content: '';
    animation: dots 1.2s steps(3, end) infinite;
  }
  @keyframes dots { 0%,20%{content:'.'} 40%{content:'..'} 60%,100%{content:'...'} }

  /* Stats bar */
  .stats-bar {
    display: flex;
    gap: 1.5rem;
    margin-bottom: 1.5rem;
    flex-wrap: wrap;
  }

  .stat {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .stat-num {
    font-family: 'DM Mono', monospace;
    font-size: 1.4rem;
    font-weight: 500;
    color: var(--ink);
  }

  .stat-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.68rem;
    letter-spacing: 0.07em;
    text-transform: uppercase;
    color: var(--ink-faint);
  }

  .divider { width: 1px; background: var(--border); align-self: stretch; }

  @media (max-width: 600px) {
    .form-grid { grid-template-columns: 1fr; }
    header { padding: 1rem; }
    .layout { padding: 1.25rem 1rem; }
    .quiz-word { font-size: 1.8rem; }
  }
</style>
</head>
<body>

<header>
  <h1>我的單字本</h1>
  <span>My Vocabulary</span>
  <span id="word-count-header">載入中...</span>
</header>

<div class="layout">
  <div class="tabs">
    <button class="tab active" onclick="switchTab('search')">查單字 Search</button>
    <button class="tab" onclick="switchTab('add')">新增 Add</button>
    <button class="tab" onclick="switchTab('review')">加強清單 Review</button>
    <button class="tab" onclick="switchTab('quiz')">測驗 Quiz</button>
  </div>

  <!-- 查單字 -->
  <div id="panel-search" class="panel active">
    <div class="search-wrap">
      <input type="text" id="search-input" placeholder="輸入單字 / Enter a word..." onkeydown="if(event.key==='Enter')doSearch()" autofocus />
      <button onclick="doSearch()">搜尋</button>
    </div>
    <div id="search-result"></div>

    <div class="stats-bar" style="margin-top:2rem">
      <div class="stat">
        <span class="stat-num" id="stat-total">—</span>
        <span class="stat-label">Total Words</span>
      </div>
      <div class="divider"></div>
      <div class="stat">
        <span class="stat-num" id="stat-repeat">—</span>
        <span class="stat-label">需加強</span>
      </div>
      <div class="divider"></div>
      <div class="stat">
        <span class="stat-num" id="stat-new">—</span>
        <span class="stat-label">本週新增</span>
      </div>
    </div>
  </div>

  <!-- 新增 -->
  <div id="panel-add" class="panel">
    <div class="form-card">
      <div class="form-grid">
        <div class="form-row">
          <label>單字 Word</label>
          <input type="text" id="new-word" placeholder="e.g. eloquent" />
        </div>
        <div class="form-row">
          <label>詞性 Part of Speech</label>
          <input type="text" id="new-pos" placeholder="adj / n / v / adv" />
        </div>
      </div>
      <div class="form-row">
        <label>解釋 Definition</label>
        <input type="text" id="new-def" placeholder="中文或英文解釋" />
      </div>
      <div class="form-row">
        <label>你的例句 Your Example Sentence</label>
        <textarea id="new-example" placeholder="用自己的句子，才有感記憶..."></textarea>
      </div>
      <button onclick="addWord()" style="width:100%">加入筆記 Add to Notebook</button>
      <div id="add-msg" class="msg"></div>
    </div>

    <div style="margin-top:1.25rem; padding:1rem; border:1px dashed var(--border); border-radius:8px; font-size:0.82rem; color:var(--ink-faint); line-height:1.8;">
      <strong style="color:var(--ink-light); font-family:'DM Mono',monospace; font-size:0.75rem; letter-spacing:0.05em; text-transform:uppercase;">注意</strong><br/>
      新增的單字會存入你的 Google Sheets，請確保試算表已設為「任何人可編輯」。<br/>
      若無法寫入，請直接在 Google Sheets 新增後重新整理此頁面。
    </div>
  </div>

  <!-- 加強清單 -->
  <div id="panel-review" class="panel">
    <div id="review-list"><div class="loading">載入中</div></div>
  </div>

  <!-- 測驗 -->
  <div id="panel-quiz" class="panel">
    <div class="quiz-card" id="quiz-card">
      <div class="quiz-hint">按下開始，隨機抽一個單字測驗你</div>
      <button onclick="startQuiz()">開始測驗 Start Quiz</button>
    </div>
  </div>
</div>

<script>
const SHEET_ID = '1JFbVa9qA7Z_mYfM0ON3Kgky4K5LNLJoSyX3UbDRq96c';
const SHEET_NAME = 'Sheet1';
const API_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${SHEET_NAME}`;

let vocab = [];
let quizWord = null;
let quizRevealed = false;

async function loadVocab() {
  try {
    const res = await fetch(API_URL);
    const text = await res.text();
    const json = JSON.parse(text.substring(47, text.length - 2));
    const rows = json.table.rows;
    vocab = rows.map(r => ({
      word: r.c[0]?.v || '',
      pos: r.c[1]?.v || '',
      definition: r.c[2]?.v || '',
      example: r.c[3]?.v || '',
      repeat: parseInt(r.c[4]?.v) || 1,
    })).filter(r => r.word);
    updateStats();
    document.getElementById('word-count-header').textContent = vocab.length + ' words';
  } catch(e) {
    document.getElementById('word-count-header').textContent = '載入失敗';
    console.error(e);
  }
}

function updateStats() {
  document.getElementById('stat-total').textContent = vocab.length;
  document.getElementById('stat-repeat').textContent = vocab.filter(v => v.repeat > 1).length;
  // words added in last 7 days — approximation using repeat=1 as proxy
  document.getElementById('stat-new').textContent = vocab.filter(v => v.repeat === 1).length;
}

function switchTab(name) {
  document.querySelectorAll('.tab').forEach((t, i) => {
    t.classList.toggle('active', ['search','add','review','quiz'][i] === name);
  });
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.getElementById('panel-' + name).classList.add('active');
  if (name === 'review') renderReview();
  if (name === 'quiz') resetQuiz();
}

function speak(word) {
  const u = new SpeechSynthesisUtterance(word);
  u.lang = 'en-US';
  u.rate = 0.9;
  window.speechSynthesis.cancel();
  window.speechSynthesis.speak(u);
}

function doSearch() {
  const q = document.getElementById('search-input').value.trim().toLowerCase();
  const el = document.getElementById('search-result');
  if (!q) { el.innerHTML = ''; return; }

  const results = vocab.filter(v => v.word.toLowerCase().includes(q));

  if (!results.length) {
    el.innerHTML = `<div class="empty">找不到「${q}」<br/>可以到「新增」把它加進筆記</div>`;
    return;
  }

  el.innerHTML = results.map(v => wordCardHTML(v)).join('');
}

function wordCardHTML(v) {
  const repeatBadge = v.repeat > 1
    ? `<span class="badge badge-repeat">重複 ${v.repeat} 次</span>` : '';
  return `
  <div class="word-card">
    <div class="word-top">
      <span class="word-main">${v.word}</span>
      ${v.pos ? `<span class="badge badge-pos">${v.pos}</span>` : ''}
      ${repeatBadge}
      <div class="word-actions">
        <button class="speak-btn" onclick="speak('${v.word.replace(/'/g,"\\'")}')">▶ 發音</button>
      </div>
    </div>
    <div class="field-label">Definition 解釋</div>
    <div class="field-def">${v.definition}</div>
    ${v.example ? `<div class="field-label">Your Example 你的例句</div>
    <div class="example-box">${v.example}</div>` : ''}
  </div>`;
}

function addWord() {
  const word = document.getElementById('new-word').value.trim();
  const pos = document.getElementById('new-pos').value.trim();
  const def = document.getElementById('new-def').value.trim();
  const example = document.getElementById('new-example').value.trim();
  const msg = document.getElementById('add-msg');

  if (!word) { showMsg(msg, '請輸入單字 Please enter a word', 'warn'); return; }
  if (!def) { showMsg(msg, '請輸入解釋 Please enter a definition', 'warn'); return; }

  const existing = vocab.find(v => v.word.toLowerCase() === word.toLowerCase());
  if (existing) {
    existing.repeat += 1;
    showMsg(msg,
      `⚠ 「${word}」你之前已經記過了！\n重複次數 +1，已加入加強清單。\n\n請到 Google Sheets 手動將此單字的 repeat 欄位更新為 ${existing.repeat}。`,
      'warn');
    updateStats();
    return;
  }

  vocab.push({ word, pos, definition: def, example, repeat: 1 });
  showMsg(msg,
    `✓ 「${word}」已加入本地筆記！\n\n請同步到 Google Sheets：新增一行填入以下資料\nword: ${word} | pos: ${pos} | definition: ${def} | example: ${example} | repeat: 1`,
    'ok');
  updateStats();
  document.getElementById('word-count-header').textContent = vocab.length + ' words';
  document.getElementById('new-word').value = '';
  document.getElementById('new-pos').value = '';
  document.getElementById('new-def').value = '';
  document.getElementById('new-example').value = '';
}

function showMsg(el, text, type) {
  el.textContent = text;
  el.className = 'msg ' + (type === 'warn' ? 'msg-warn' : 'msg-ok');
  el.style.display = 'block';
  el.style.whiteSpace = 'pre-line';
}

function renderReview() {
  const list = vocab.filter(v => v.repeat > 1).sort((a, b) => b.repeat - a.repeat);
  const el = document.getElementById('review-list');
  if (!list.length) {
    el.innerHTML = '<div class="empty">目前沒有重複記錄的單字<br/>繼續加油！</div>';
    return;
  }
  el.innerHTML = `
    <div style="font-family:'DM Mono',monospace;font-size:0.72rem;letter-spacing:0.07em;text-transform:uppercase;color:var(--ink-faint);margin-bottom:1rem;">
      ${list.length} words need review
    </div>` +
    list.map(v => `
    <div class="review-item">
      <div>
        <div class="review-word">${v.word}</div>
        <div class="review-def">${v.definition}</div>
      </div>
      <div class="review-right">
        <span class="badge badge-repeat">×${v.repeat}</span>
        <button class="speak-btn" onclick="speak('${v.word.replace(/'/g,"\\'")}')">▶</button>
      </div>
    </div>`).join('');
}

function resetQuiz() {
  quizWord = null;
  quizRevealed = false;
  document.getElementById('quiz-card').innerHTML = `
    <div class="quiz-hint">按下開始，隨機抽一個單字測驗你</div>
    <button onclick="startQuiz()">開始測驗 Start Quiz</button>`;
}

function startQuiz() {
  if (!vocab.length) return;
  const weighted = [];
  vocab.forEach(v => {
    for (let i = 0; i < v.repeat; i++) weighted.push(v);
  });
  quizWord = weighted[Math.floor(Math.random() * weighted.length)];
  quizRevealed = false;
  document.getElementById('quiz-card').innerHTML = `
    <div class="quiz-hint">這個單字是什麼意思？What does this mean?</div>
    <div class="quiz-word">${quizWord.word}</div>
    <div style="display:flex;gap:8px;">
      <button class="speak-btn" onclick="speak('${quizWord.word.replace(/'/g,"\\'")}')">▶ 發音</button>
    </div>
    <div class="quiz-answer" id="quiz-answer">
      <div class="field-label" style="margin-bottom:6px">解釋</div>
      <div style="font-size:1rem;margin-bottom:10px">${quizWord.definition}</div>
      ${quizWord.example ? `<div class="field-label" style="margin-bottom:6px">你的例句</div>
      <div style="font-family:'Lora',serif;font-style:italic;font-size:0.92rem;color:var(--ink-light)">${quizWord.example}</div>` : ''}
    </div>
    <div class="quiz-controls">
      <button class="outline" onclick="revealAnswer()">顯示答案 Reveal</button>
      <button onclick="startQuiz()">下一題 Next →</button>
    </div>`;
}

function revealAnswer() {
  const ans = document.getElementById('quiz-answer');
  if (ans) ans.style.display = 'block';
}

loadVocab();
</script>
</body>
</html>
